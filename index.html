<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Srijan's Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-canvas-default:#0d1117;
  --color-canvas-subtle:#161b22;
  --color-canvas-inset:#010409;
  --color-border-default:#30363d;
  --color-border-muted:#21262d;
  --color-border-subtle:rgba(240,246,252,0.1);
  --color-fg-default:#e6edf3;
  --color-fg-muted:#8b949e;
  --color-fg-subtle:#6e7681;
  --color-fg-on-emphasis:#ffffff;
  --color-accent-fg:#58a6ff;
  --color-accent-emphasis:#1f6feb;
  --color-accent-muted:rgba(56,139,253,0.15);
  --color-success-fg:#3fb950;
  --color-success-emphasis:#238636;
  --color-success-muted:rgba(46,160,67,0.15);
  --color-attention-fg:#d29922;
  --color-attention-emphasis:#9e6a03;
  --color-attention-muted:rgba(187,128,9,0.15);
  --color-danger-fg:#f85149;
  --color-danger-emphasis:#da3633;
  --color-danger-muted:rgba(248,81,73,0.15);
  --color-done-fg:#a371f7;
  --color-done-muted:rgba(163,113,247,0.15);
  --color-sponsors-fg:#db61a2;
  --color-primer-shadow-inset:inset 0 1px 0 rgba(208,215,222,0.25);
  --radius-sm:6px;
  --radius-md:6px;
  --radius-lg:6px;
  --font-mono:'JetBrains Mono',monospace;
  --font-body:'Geist',sans-serif;
}
*{scrollbar-width:thin;scrollbar-color:var(--color-border-default) transparent}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-border-default);border-radius:3px}

body{
  font-family:var(--font-body);
  background:var(--color-canvas-default);
  color:var(--color-fg-default);
  min-height:100vh;
  font-size:14px;
  line-height:1.5;
}

/* APP SHELL */
.app{display:flex;flex-direction:column;min-height:100vh}
.header{height:48px;background:var(--color-canvas-subtle);border-bottom:1px solid var(--color-border-default);display:flex;align-items:center;padding:0 16px;gap:16px;position:sticky;top:0;z-index:100}
.header-logo{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--color-fg-default);white-space:nowrap;display:flex;align-items:center;gap:8px}
.header-repo{font-family:var(--font-mono);font-size:13px;color:var(--color-accent-fg);font-weight:600}
.tab-nav{background:var(--color-canvas-subtle);border-bottom:1px solid var(--color-border-default);display:flex;align-items:flex-end;padding:0 16px;overflow-x:auto}
.tab-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:500;color:var(--color-fg-muted);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--font-body);transition:color .12s,border-color .12s}
.tab-btn:hover{color:var(--color-fg-default)}
.tab-btn.active{color:var(--color-fg-default);border-bottom-color:#f78166}
.tab-count{background:var(--color-border-default);color:var(--color-fg-muted);font-family:var(--font-mono);font-size:11px;padding:0 6px;height:18px;line-height:18px;border-radius:20px}
.tab-btn.active .tab-count{background:var(--color-attention-emphasis);color:#fff}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:256px;flex-shrink:0;border-right:1px solid var(--color-border-default);padding:16px 0;display:flex;flex-direction:column;gap:4px}
.side-section{padding:0 8px;margin-bottom:8px}
.side-label{font-size:11px;font-weight:600;color:var(--color-fg-subtle);letter-spacing:.5px;text-transform:uppercase;padding:4px 8px;margin-bottom:2px}
.side-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);font-size:13px;color:var(--color-fg-muted);background:transparent;border:none;cursor:pointer;font-family:var(--font-body);width:100%;text-align:left;transition:background .1s,color .1s}
.side-btn:hover{background:var(--color-canvas-inset);color:var(--color-fg-default)}
.side-btn.active{background:rgba(56,139,253,0.15);color:var(--color-accent-fg);font-weight:500}
.side-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.side-count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--color-fg-subtle);background:var(--color-canvas-inset);border:1px solid var(--color-border-muted);border-radius:20px;padding:0 6px;height:16px;line-height:16px}
.main{flex:1;overflow-y:auto;padding:24px;max-width:900px}
.page{display:none}.page.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--color-border-muted)}
.section-title{font-size:20px;font-weight:600;color:var(--color-fg-default)}
.box{background:var(--color-canvas-subtle);border:1px solid var(--color-border-default);border-radius:var(--radius-md);margin-bottom:16px;overflow:hidden}
.box-header{padding:12px 16px;border-bottom:1px solid var(--color-border-muted);display:flex;align-items:center;justify-content:space-between;background:var(--color-canvas-subtle)}
.box-title{font-size:14px;font-weight:600;color:var(--color-fg-default);display:flex;align-items:center;gap:8px}
.box-body{padding:16px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--color-border-muted);border:1px solid var(--color-border-muted);border-radius:var(--radius-md);overflow:hidden;margin-bottom:16px}
.stat-cell{background:var(--color-canvas-subtle);padding:16px}
.stat-label{font-size:11px;font-weight:600;color:var(--color-fg-subtle);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:600;font-family:var(--font-mono);color:var(--color-fg-default)}
.stat-sub{font-size:11px;color:var(--color-fg-muted);margin-top:2px}
.field{margin-bottom:12px}
.field-label{display:block;font-size:12px;font-weight:600;color:var(--color-fg-default);margin-bottom:6px}
input[type=text],input[type=number],input[type=date],input[type=time],input[type=datetime-local],input[type=password],select,textarea{width:100%;background:var(--color-canvas-inset);border:1px solid var(--color-border-default);border-radius:var(--radius-sm);color:var(--color-fg-default);font-family:var(--font-body);font-size:14px;padding:5px 12px;height:32px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--color-accent-fg);box-shadow:0 0 0 3px rgba(31,111,235,0.3)}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;font-size:14px;font-weight:500;border-radius:var(--radius-sm);border:1px solid var(--color-border-default);background:var(--color-canvas-subtle);color:var(--color-fg-default);cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--color-success-emphasis);border-color:rgba(240,246,252,0.1);color:#fff}
.badge{display:inline-flex;align-items:center;height:20px;padding:0 8px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid transparent}
.badge-blue{background:var(--color-accent-muted);border-color:var(--color-accent-fg);color:var(--color-accent-fg)}
.progress-wrap{background:var(--color-border-muted);border-radius:6px;height:8px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:6px;transition:width .3s;background:var(--color-success-emphasis)}
.gh-table{width:100%;border-collapse:collapse;font-size:13px}
.gh-table th{font-size:12px;font-weight:600;color:var(--color-fg-muted);padding:8px 12px;border-bottom:1px solid var(--color-border-muted);text-align:left}
.gh-table td{padding:10px 12px;border-bottom:1px solid var(--color-border-muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--color-canvas-subtle);border:1px solid var(--color-border-default);border-radius:var(--radius-md);padding:10px 14px;font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.spinner{display:inline-block;width:12px;height:12px;border:1.5px solid var(--color-border-default);border-top-color:var(--color-accent-fg);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app" id="main-app">
  <div class="header">
    <svg height="24" width="24" viewBox="0 0 16 16" fill="var(--color-fg-default)"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    <span class="header-logo">
      <span style="color:var(--color-fg-muted)">srijan</span>
      <span style="color:var(--color-fg-muted)">/</span>
      <span class="header-repo">studio</span>
    </span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <span id="sync-status" style="font-size:12px;color:var(--color-fg-subtle);font-family:var(--font-mono)"></span>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="setPage('home')">⊞ Overview</button>
    <button class="tab-btn" onclick="setPage('french')">🇫🇷 French <span class="tab-count" id="tc-french">0</span></button>
    <button class="tab-btn" onclick="setPage('writing')">✍️ Writing <span class="tab-count" id="tc-writing">0</span></button>
    <button class="tab-btn" onclick="setPage('calendar')">📅 Calendar <span class="tab-count" id="tc-calendar">0</span></button>
    <button class="tab-btn" onclick="setPage('fitness')">💪 Fitness <span class="tab-count" id="tc-fitness">0</span></button>
    <button class="tab-btn" onclick="setPage('sleep')">🌙 Sleep <span class="tab-count" id="tc-sleep">0</span></button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="side-section">
        <div class="side-label">Modules</div>
        <button class="side-btn active" onclick="setPage('home')">Overview</button>
        <button class="side-btn" onclick="setPage('french')">French <span class="side-count" id="sc-french">0</span></button>
        <button class="side-btn" onclick="setPage('writing')">Writing <span class="side-count" id="sc-writing">0</span></button>
        <button class="side-btn" onclick="setPage('calendar')">Calendar <span class="side-count" id="sc-calendar">0</span></button>
        <button class="side-btn" onclick="setPage('fitness')">Fitness <span class="side-count" id="sc-fitness">0</span></button>
        <button class="side-btn" onclick="setPage('sleep')">Sleep <span class="side-count" id="sc-sleep">0</span></button>
      </div>
    </div>

    <div class="main">
      <div class="page active" id="page-home">
        <div class="section-header">
          <div>
            <div class="section-title" id="greeting-text">Overview</div>
            <div style="font-size:12px;color:var(--color-fg-muted);margin-top:2px;font-family:var(--font-mono)" id="greeting-date"></div>
          </div>
        </div>
        <div class="box">
          <div class="box-header"><div class="box-title">Summary</div></div>
          <div id="home-summary"></div>
        </div>
      </div>

      <div class="page" id="page-french">...</div>
      <div class="page" id="page-writing">...</div>
      <div class="page" id="page-calendar">...</div>
      <div class="page" id="page-fitness">...</div>
      <div class="page" id="page-sleep">...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script>
// CONFIG
const SUPABASE_URL='https://zrmnwkbhqpburvvmgzus.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpybW53a2JocXBidXJ2dm1nenVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjE0NDQsImV4cCI6MjA5MjkzNzQ0NH0.TMpsT4b_3gGX6rcmxEjLTZHkEE3AoiWsVkSP-j97M_s';

const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const state={fr:[],wr:[],cal:[],fit:[],sl:[],frLevel:'A1'};
const picked={};

// INITIALIZE IMMEDIATELY
function init(){
  const t=new Date().toISOString().slice(0,10);
  ['fr-date','fit-date','sl-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=t});
  loadData();
}

async function loadData(){
  document.getElementById('sync-status').textContent='connecting…';
  try {
    const [fr, wr, cal, fit, sl] = await Promise.all([
      db.from('french').select('*').order('created_at',{ascending:false}),
      db.from('writing').select('*').order('created_at',{ascending:false}),
      db.from('calendar').select('*').order('created_at',{ascending:false}),
      db.from('fitness').select('*').order('created_at',{ascending:false}),
      db.from('sleep').select('*').order('created_at',{ascending:false})
    ]);
    state.fr = fr.data || [];
    state.wr = wr.data || [];
    state.cal = cal.data || [];
    state.fit = fit.data || [];
    state.sl = sl.data || [];
    
    document.getElementById('sync-status').textContent='synced';
    renderHome();
    updateCounts();
  } catch(e) {
    document.getElementById('sync-status').textContent='error';
  }
}

function setPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
}

// Start app
init();
</script>
</body>
</html>
